# .github/workflows/mobile-build.yml
#
# Phase 6 release pipeline per plan §G.3.
#
# Triggers:
#   - tag push: 'mobile-v*' (e.g. mobile-v0.1.0) — full release build
#   - schedule: weekly Sunday 02:00 UTC — smoke build against
#     NousResearch/hermes-agent main to catch upstream drift
#   - workflow_dispatch: manual trigger for ad-hoc builds
#
# The weekly smoke build uses the same assembleRelease pipeline
# but pushes artifacts to a `mobile-nightly-*` tag instead of a
# release. It runs in ~15 min and catches most issues before they
# reach a human release manager.

name: mobile-build

on:
  push:
    tags:
      - 'mobile-v*'
  schedule:
    - cron: '0 2 * * 0'  # Sunday 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write  # for softprops/action-gh-release

# Opt into the GitHub-hosted Node.js 24 runtime before the June 16, 2026
# forced upgrade. The actions we use (actions/checkout@v4,
# actions/setup-node@v4, actions/setup-java@v4, pnpm/action-setup@v4,
# actions/cache@v4, android-actions/setup-android@v3) are all currently
# on Node 20; setting this env var moves them to Node 24 across the job.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0  # for tags

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          # Capacitor 8 + AGP 8.7+ target Java 21 source. The 9th
          # smoke run (#26928591201) failed at
          # ':capacitor-android:compileReleaseJavaWithJavac' with
          # 'invalid source release: 21' because the workflow
          # installed JDK 17. F-Droid metadata still says 'gradle:
          # 8.7' which is AGP 8.5–8.7 (Java 17 target), but
          # @capacitor/android 8.4.0 requires Java 21.
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          # android-actions/setup-android@v3 takes a single `packages`
          # string of sdkmanager-style coordinates, not the v2
          # api-level/build-tools-version/ndk-version triplet.
          # compileSdk bumped to 36 (Android 16) for androidx.core
          # 1.17.0 / androidx.activity 1.11.0 compatibility. NDK
          # stays on r27d (LTS) — independent of compileSdk.
          packages: 'platforms;android-36 build-tools;36.0.0 ndk;27.3.13750724'

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install workspace dependencies
        # v0.1.0: apps/mobile/package.json is a minimal stub
        # (no Capacitor / no React / no @hermes/renderer). The
        # pnpm install is fast and just syncs the workspace.
        run: pnpm install --frozen-lockfile

      - name: Sync android-runner to apps/mobile/android
        # Per groovy-fluttering-island.md Phase 0c: android-runner/ is
        # the canonical source of truth for the Hermes Kotlin sources.
        # The setup-android.sh script rsyncs the entire runner tree
        # (including HermesApi.kt, MainActivity.kt, the Compose UI, and
        # the chat/db/memory packages) into apps/mobile/android/. The
        # WebView+Capacitor+vendored-renderer era is over.
        # v0.1.0: this step also copies android-runner/app/build.gradle.template
        # onto apps/mobile/android/app/build.gradle. The template
        # carries the Phase 0-7+8 wiring (buildscript, KSP, Room,
        # OkHttp, Markwon, BuildConfig.SENTRY_DSN, ABI splits,
        # signingConfigs.release, Sentry dep). v0.1.0 also syncs
        # the template to the live build.gradle (see commit fc60d5b
        # which resolved a long-standing template-drift bug).
        run: bash apps/mobile/scripts/setup-android.sh

      - name: Verify Kotlin drift guard
        # CI fails the build if android-runner/ and apps/mobile/android/
        # diverge. The drift check is run AFTER setup-android.sh so it
        # reports "in sync" rather than reporting the unfixed drift.
        run: bash script/check-kotlin-drift.sh

      - name: Decode keystore from base64 secret
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        env:
          KEYSTORE_FILE_B64: ${{ secrets.KEYSTORE_FILE_B64 }}
        run: |
          if [[ -n "$KEYSTORE_FILE_B64" ]]; then
            echo "$KEYSTORE_FILE_B64" | base64 -d > /tmp/release.jks
            ls -la /tmp/release.jks
          fi

      - name: Generate keystore.properties for release
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # v0.1.0 fix: the env block was previously only on
          # the assembleRelease step, so $KEYSTORE_PASSWORD /
          # $KEY_PASSWORD were empty here and the resulting
          # keystore.properties had blank passwords. The new
          # signing fail-fast in build.gradle then correctly
          # failed the release build with a clear error —
          # better than a silent unsigned APK. With this env
          # block, the file is written with the real secrets
          # and assembleRelease proceeds.
          #
          # Required repo secrets (Settings → Secrets and
          # variables → Actions):
          #   - KEYSTORE_FILE_B64 — base64 of keystore/release.jks
          #   - KEYSTORE_PASSWORD — keystore store password
          #   - KEY_PASSWORD — key password
          # If any are missing, the build fails fast at the
          # gradle signing step with a clear error.
          cat > keystore/keystore.properties <<EOF
          storeFile=/tmp/release.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=hermes
          keyPassword=$KEY_PASSWORD
          EOF
          echo "wrote keystore.properties (size $(wc -c < keystore/keystore.properties) bytes)"

      - name: Generate F-Droid keystore.properties (no signing)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          # For the weekly smoke build we don't have a real key;
          # the unsigned APK is what F-Droid rebuilds from.
          mkdir -p keystore
          touch keystore/keystore.properties

      - name: Gradle assembleRelease
        working-directory: apps/mobile/android
        env:
          KEYSTORE_FILE_B64: ${{ secrets.KEYSTORE_FILE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: hermes
        run: |
          # Use assembleRelease only for tag builds, where the
          # keystore setup steps (Decode + Generate keystore.properties)
          # actually run. For workflow_dispatch / schedule smoke
          # builds, those steps are skipped (gated on tag) and the
          # F-Droid step writes an empty keystore.properties — which
          # makes the release signingConfig incomplete and fails
          # PackageAndroidArtifact with 'SigningConfig "release" is
          # missing required property "storeFile"'. assembleDebug
          # doesn't need a signingConfig and produces the same APK
          # shape (debug-built) for the smoke build to upload.
          #
          # v0.1.0: the gradle build itself signs the release APKs
          # via the `signingConfigs.release` block in build.gradle
          # (which reads keystore/keystore.properties). The
          # post-build `scripts/sign-and-zipalign.sh` step that
          # used to run after this was a no-op for gradle-signed
          # output (the script globs `*-unsigned.apk` which
          # doesn't match the signed APKs gradle produces), and
          # removing it eliminates a confusing dead code path. If
          # a future change to build.gradle ever removes the
          # signingConfigs.release block, the sign-and-zipalign
          # script can be re-introduced as a manual local-only
          # tool — see the header comment in that script.
          #
          # The 19th smoke run (#26930285356) reached 491 tasks
          # executed before failing on this; everything after Kotlin
          # compile (signing, manifest merge, resource link, AAB
          # build, dex, package) was all green — we just need
          # a working signing config to finish the pipeline.
          if [[ "$GITHUB_REF" == refs/tags/mobile-v* ]]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi

      - name: Generate latest.json (release only)
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        run: bash scripts/write-update-manifest.sh

      - name: Upload debug APK (smoke builds)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: hermes-mobile-debug
          path: apps/mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Hermes Mobile ${{ github.ref_name }}'
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            apps/mobile/android/app/build/outputs/apk/release/*.apk
            latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build F-Droid artifact
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        run: bash f-droid/build.sh

      - name: Upload F-Droid build
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        uses: actions/upload-artifact@v4
        with:
          name: hermes-mobile-fdroid
          path: f-droid/output/*.apk
          retention-days: 30
