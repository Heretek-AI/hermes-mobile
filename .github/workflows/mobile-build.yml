# .github/workflows/mobile-build.yml
#
# Phase 6 release pipeline per plan §G.3.
#
# Triggers:
#   - tag push: 'mobile-v*' (e.g. mobile-v0.1.0) — full release build
#   - schedule: weekly Sunday 02:00 UTC — smoke build against
#     NousResearch/hermes-agent main to catch upstream drift
#   - workflow_dispatch: manual trigger for ad-hoc builds
#
# The weekly smoke build uses the same assembleRelease pipeline
# but pushes artifacts to a `mobile-nightly-*` tag instead of a
# release. It runs in ~15 min and catches most issues before they
# reach a human release manager.

name: mobile-build

on:
  push:
    tags:
      - 'mobile-v*'
  schedule:
    - cron: '0 2 * * 0'  # Sunday 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write  # for softprops/action-gh-release

# Opt into the GitHub-hosted Node.js 24 runtime before the June 16, 2026
# forced upgrade. The actions we use (actions/checkout@v4,
# actions/setup-node@v4, actions/setup-java@v4, pnpm/action-setup@v4,
# actions/cache@v4, android-actions/setup-android@v3) are all currently
# on Node 20; setting this env var moves them to Node 24 across the job.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0  # for tags

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          # Capacitor 8 + AGP 8.7+ target Java 21 source. The 9th
          # smoke run (#26928591201) failed at
          # ':capacitor-android:compileReleaseJavaWithJavac' with
          # 'invalid source release: 21' because the workflow
          # installed JDK 17. F-Droid metadata still says 'gradle:
          # 8.7' which is AGP 8.5–8.7 (Java 17 target), but
          # @capacitor/android 8.4.0 requires Java 21.
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          # android-actions/setup-android@v3 takes a single `packages`
          # string of sdkmanager-style coordinates, not the v2
          # api-level/build-tools-version/ndk-version triplet.
          # compileSdk bumped to 36 (Android 16) for androidx.core
          # 1.17.0 / androidx.activity 1.11.0 compatibility. NDK
          # stays on r27d (LTS) — independent of compileSdk.
          packages: 'platforms;android-36 build-tools;36.0.0 ndk;27.3.13750724'

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer
        run: pnpm --filter @hermes/renderer typecheck

      - name: Build IPC + renderer + mobile (Vite)
        run: pnpm run build

      - name: Clone desktop renderer at pinned SHA
        # The desktop's React renderer is vendored at build time from
        # fathah/hermes-desktop. The SHA is pinned in
        # apps/mobile/scripts/hermes-desktop-version.txt so the build
        # is reproducible. review/ is gitignored and only exists on a
        # maintainer's local checkout, so CI must clone fresh.
        run: |
          set -euo pipefail
          SHA=$(grep -v '^#' apps/mobile/scripts/hermes-desktop-version.txt | tr -d '[:space:]')
          if [[ -z "$SHA" ]]; then
            echo "error: empty SHA in apps/mobile/scripts/hermes-desktop-version.txt" >&2
            exit 1
          fi
          echo "Cloning fathah/hermes-desktop @ $SHA"
          git clone --filter=blob:none --no-checkout \
            https://github.com/fathah/hermes-desktop.git /tmp/hermes-desktop
          git -C /tmp/hermes-desktop checkout "$SHA"

      - name: Vendor desktop renderer
        env:
          # Point the vendor script at the clone we just made; falls
          # back to review/hermes-desktop/ for local devs (no env var).
          HERMES_DESKTOP_SRC: /tmp/hermes-desktop/src/renderer/src
          HERMES_DESKTOP_SHARED_SRC: /tmp/hermes-desktop/src/shared
        run: bash apps/mobile/scripts/vendor-renderer.sh

      - name: Decode keystore from base64 secret
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        run: |
          if [[ -n "$KEYSTORE_FILE_B64" ]]; then
            echo "$KEYSTORE_FILE_B64" | base64 -d > /tmp/release.jks
            ls -la /tmp/release.jks
          fi

      - name: Generate keystore.properties for release
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        run: |
          cat > keystore/keystore.properties <<EOF
          storeFile=/tmp/release.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=hermes
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Generate F-Droid keystore.properties (no signing)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          # For the weekly smoke build we don't have a real key;
          # the unsigned APK is what F-Droid rebuilds from.
          mkdir -p keystore
          touch keystore/keystore.properties

      - name: Scaffold Capacitor android platform
        # The apps/mobile/android/ dir is gitignored — each maintainer
        # runs `npx cap add android` locally to generate it. CI has no
        # such checkout, so the workflow scaffolds it. The hashFiles
        # guard makes this idempotent: skip when build.gradle already
        # exists (a previous CI run cached on the runner, or a future
        # world where it gets checked in). Note: GitHub Actions has
        # no `!` prefix for if:, so we test for the empty case.
        if: hashFiles('apps/mobile/android/app/build.gradle') == ''
        working-directory: apps/mobile
        run: pnpm exec cap add android

      - name: Copy HermesAPIPlugin into generated android project
        # Injects the HermesAPIPlugin Kotlin sources from android-runner/
        # into the generated android/ project. Real failures must surface
        # (no || true — earlier this masked missing-android-dir errors).
        run: bash apps/mobile/scripts/setup-android.sh

      - name: Run cap sync
        # Copies the Vite-built web assets + plugins into the
        # generated android/ project. The script is named 'cap:sync'
        # (with a colon) in apps/mobile/package.json — pnpm uses
        # the colon to distinguish scripts from positional args, so
        # the previous `cap sync android` invocation (no colon)
        # failed with "None of the selected packages has a 'cap'
        # script". Must run BEFORE the build.gradle template copy —
        # cap sync can regenerate build.gradle from its own
        # template, so we have to be the last word.
        run: pnpm --filter @hermes-mobile/app cap:sync

      - name: Copy build.gradle template
        # The Phase 6 build.gradle.template layers ABI splits +
        # signingConfigs.release on top of the default scaffold that
        # `cap add android` produces, and survives `cap sync`. This
        # step must run AFTER cap sync — the 6th smoke run failed
        # at Gradle with 'compileSdk not specified' because cap
        # sync was re-creating build.gradle from its own scaffold
        # template and overwriting our copy.
        run: |
          if [[ -f android-runner/app/build.gradle.template ]]; then
            cp android-runner/app/build.gradle.template apps/mobile/android/app/build.gradle
          fi

      - name: Gradle assembleRelease
        working-directory: apps/mobile/android
        env:
          KEYSTORE_FILE_B64: ${{ secrets.KEYSTORE_FILE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: hermes
        run: |
          if [[ -n "$KEYSTORE_FILE_B64" ]]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi

      - name: Sign and zipalign (release only)
        if: startsWith(github.ref, 'refs/tags/mobile-v') && env.KEYSTORE_FILE_B64 != ''
        env:
          KEYSTORE_FILE: /tmp/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: hermes
        run: bash scripts/sign-and-zipalign.sh

      - name: Generate latest.json (release only)
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        run: bash scripts/write-update-manifest.sh

      - name: Upload debug APK (smoke builds)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: hermes-mobile-debug
          path: apps/mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Hermes Mobile ${{ github.ref_name }}'
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            apps/mobile/android/app/build/outputs/apk/release/*.apk
            latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build F-Droid artifact
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        run: bash f-droid/build.sh

      - name: Upload F-Droid build
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        uses: actions/upload-artifact@v4
        with:
          name: hermes-mobile-fdroid
          path: f-droid/output/*.apk
          retention-days: 30
