# .github/workflows/mobile-build.yml
#
# Phase 6 release pipeline per plan §G.3.
#
# Triggers:
#   - tag push: 'mobile-v*' (e.g. mobile-v0.1.0) — full release build
#   - schedule: weekly Sunday 02:00 UTC — smoke build against
#     NousResearch/hermes-agent main to catch upstream drift
#   - workflow_dispatch: manual trigger for ad-hoc builds
#
# The weekly smoke build uses the same assembleRelease pipeline
# but pushes artifacts to a `mobile-nightly-*` tag instead of a
# release. It runs in ~15 min and catches most issues before they
# reach a human release manager.

name: mobile-build

on:
  push:
    tags:
      - 'mobile-v*'
  schedule:
    - cron: '0 2 * * 0'  # Sunday 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write  # for softprops/action-gh-release

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0  # for tags

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 35
          build-tools-version: '35.0.0'
          ndk-version: 'r26b'

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer
        run: pnpm --filter @hermes/renderer typecheck

      - name: Build IPC + renderer + mobile (Vite)
        run: pnpm run build

      - name: Vendor desktop renderer
        run: bash apps/mobile/scripts/vendor-renderer.sh

      - name: Decode keystore from base64 secret
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        run: |
          if [[ -n "$KEYSTORE_FILE_B64" ]]; then
            echo "$KEYSTORE_FILE_B64" | base64 -d > /tmp/release.jks
            ls -la /tmp/release.jks
          fi

      - name: Generate keystore.properties for release
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        run: |
          cat > keystore/keystore.properties <<EOF
          storeFile=/tmp/release.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=hermes
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Generate F-Droid keystore.properties (no signing)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          # For the weekly smoke build we don't have a real key;
          # the unsigned APK is what F-Droid rebuilds from.
          mkdir -p keystore
          touch keystore/keystore.properties

      - name: Copy HermesAPIPlugin into generated android project
        run: bash apps/mobile/scripts/setup-android.sh || true

      - name: Copy build.gradle template
        if: hashFiles('apps/mobile/android/app/build.gradle') != ''
        run: |
          if [[ -f android-runner/app/build.gradle.template ]]; then
            cp android-runner/app/build.gradle.template apps/mobile/android/app/build.gradle
          fi

      - name: Run cap sync
        run: pnpm --filter @hermes-mobile/app cap sync android

      - name: Gradle assembleRelease
        working-directory: apps/mobile/android
        env:
          KEYSTORE_FILE_B64: ${{ secrets.KEYSTORE_FILE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: hermes
        run: |
          if [[ -n "$KEYSTORE_FILE_B64" ]]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi

      - name: Sign and zipalign (release only)
        if: startsWith(github.ref, 'refs/tags/mobile-v') && env.KEYSTORE_FILE_B64 != ''
        env:
          KEYSTORE_FILE: /tmp/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: hermes
        run: bash scripts/sign-and-zipalign.sh

      - name: Generate latest.json (release only)
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        run: bash scripts/write-update-manifest.sh

      - name: Upload debug APK (smoke builds)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: hermes-mobile-debug
          path: apps/mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Hermes Mobile ${{ github.ref_name }}'
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            apps/mobile/android/app/build/outputs/apk/release/*.apk
            latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build F-Droid artifact
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        run: bash f-droid/build.sh

      - name: Upload F-Droid build
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        uses: actions/upload-artifact@v4
        with:
          name: hermes-mobile-fdroid
          path: f-droid/output/*.apk
          retention-days: 30
